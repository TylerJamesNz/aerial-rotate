# Rotate the aerial-rotate daemon log so the finer per-2% progress lines
# don't grow it unbounded. macOS built-in newsyslog (launchd-driven), no cron.
# Deploy: sudo install -m 644 -o root -g wheel \
#   newsyslog.d/aerial-rotate.conf /etc/newsyslog.d/aerial-rotate.conf
# Verify: sudo newsyslog -nv
#
# logfilename               owner:group  mode count size(KB) when flags
/var/log/aerial-rotate.log  root:wheel   644  5    512      *    NZ
